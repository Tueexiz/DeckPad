<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#1e40af"/>
    </linearGradient>
    <linearGradient id="cube" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#dbeafe"/>
    </linearGradient>
  </defs>
  <!-- Pleine surface pour zone safe maskable Android -->
  <rect width="512" height="512" fill="url(#bg)"/>
  <!-- Grille centrée dans la zone safe (40% de marge) -->
  <g transform="translate(160 175)">
    <g fill="url(#cube)" filter="drop-shadow(0 10px 18px rgba(0,0,0,0.25))">
      <rect x="0"   y="0"   width="56" height="56" rx="12"/>
      <rect x="68"  y="0"   width="56" height="56" rx="12"/>
      <rect x="136" y="0"   width="56" height="56" rx="12"/>
      <rect x="0"   y="68"  width="56" height="56" rx="12"/>
      <rect x="68"  y="68"  width="56" height="56" rx="12"/>
      <rect x="136" y="68"  width="56" height="56" rx="12"/>
      <rect x="0"   y="136" width="56" height="56" rx="12"/>
      <rect x="68"  y="136" width="56" height="56" rx="12"/>
      <rect x="136" y="136" width="56" height="56" rx="12"/>
    </g>
  </g>
</svg>
